<!-- app/templates/book_session.html -->
{% extends 'base.html' %}

{% block title %}Book a Session{% endblock %}

{% block content %}
<div class="form-container">
    <h1>Book a Session</h1>

    <form action="/manager/book_session" method="POST" class="session-form">
        <div class="form-group">
            <label for="room_id">Select Room</label>
            <select id="room_id" name="room_id" required>
                {% for room in rooms %}
                <option value="{{ room.id }}">{{ room.name }}</option>
                {% else %}
                <option value="" disabled>No rooms available</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="customer_id">Select Customer</label>
            <select id="customer_id" name="customer_id" required>
                {% for customer in customers %}
                <option value="{{ customer.id }}">{{ customer.name }}</option>
                {% else %}
                <option value="" disabled>No customers available</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="start_time">Start Time</label>
            <input type="datetime-local" id="start_time" name="start_time" required>
        </div>

        <button type="submit" class="btn">Book Session</button>
    </form>
</div>
{% endblock %}

<style>
.form-container {
    max-width: 600px;
    margin: 2rem auto;
    padding: 2rem;
    background: #f8f9fa;
    border: 1px solid #ddd;
    border-radius: 5px;
}

.form-container h1 {
    margin-bottom: 1.5rem;
    text-align: center;
    color: #333;
}

.session-form {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.form-group {
    display: flex;
    flex-direction: column;
}

.form-group label {
    margin-bottom: 0.5rem;
    color: #555;
    font-weight: 500;
}

.form-group select,
.form-group input {
    padding: 0.5rem;
    border: 1px solid #ddd;
    border-radius: 5px;
    font-size: 1rem;
    color: #333;
}

button.btn {
    background: #007bff;
    color: #fff;
    padding: 0.75rem;
    border: none;
    border-radius: 5px;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
}

button.btn:hover {
    background: #0056b3;
}
</style>
