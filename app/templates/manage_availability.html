<!-- app/templates/manage_availability.html -->
{% extends 'base.html' %}

{% block head %}
<!-- Add FullCalendar dependencies -->
<link href='https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/3.10.2/fullcalendar.min.css' rel='stylesheet' />
<script src='https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.1/moment.min.js'></script>
<script src='https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/3.10.2/fullcalendar.min.js'></script>
<!-- Add our custom CSS -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/availability.css') }}">
{% endblock %}

{% block content %}
<div class="availability-container">
    <h1 class="page-title">Manage Room Availability</h1>

    <div class="form-group">
        <label for="room-select" class="form-label">Select Room:</label>
        <select id="room-select" class="form-select">
            {% for room in rooms %}
            <option value="{{ room.id }}">{{ room.name }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <h2 class="section-title">Manage Time Slot</h2>
        <div class="button-group">
            <button id="mark-available" class="btn btn-available tooltip" data-tooltip="Mark selected time slot as available">
                Mark as Available
            </button>
            <button id="mark-unavailable" class="btn btn-unavailable tooltip" data-tooltip="Mark selected time slot as unavailable">
                Mark as Unavailable
            </button>
        </div>

        <div class="form-group">
            <label for="customer-select" class="form-label">Assign to Customer:</label>
            <select id="customer-select" class="form-select">
                <option value="">Select a customer</option>
                {% for customer in customers %}
                <option value="{{ customer.id }}">{{ customer.name }}</option>
                {% endfor %}
            </select>
        </div>

        <button id="book-customer" class="btn btn-book tooltip" data-tooltip="Book selected time slot for customer">
            Book for Customer
        </button>
    </div>

    <div class="calendar-container">
        <div id="calendar"></div>
    </div>

    <div id="status-message" class="status-message"></div>
</div>

<!-- Add our custom JS -->
<script src="{{ url_for('static', filename='js/manage_availability.js') }}"></script>
{% endblock %}
